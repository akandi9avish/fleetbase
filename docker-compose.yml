services:
  cache:
    image: redis:4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: mysql:8.0-oracle
    restart: unless-stopped
    ports:
      - "3307:3306"
    volumes:
      - "./docker/database/:/docker-entrypoint-initdb.d/"
      - "./docker/database/mysql:/var/lib/mysql"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "fleetbase"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  socket:
    image: socketcluster/socketcluster:v17.4.0
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 10
      SOCKETCLUSTER_BROKERS: 10
      # SOCKETCLUSTER_OPTIONS can be set via docker-compose.override.yml for specific environments
      # For production, use: SOCKETCLUSTER_OPTIONS: '{"origins":"https://yourdomain.com:*"}'
      # For development, use: SOCKETCLUSTER_OPTIONS: '{"origins":"http://localhost:*"}'

  # Main Fleetbase API - Built from Railway Dockerfile for production parity
  # Handles: migrations, seeding, permissions, REEUP role seeding automatically on startup
  application:
    build:
      context: .
      dockerfile: Dockerfile.railway
    ports:
      - "8090:8000"
    volumes:
      - ./api/.env:/fleetbase/api/.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "mysql://root@database/fleetbase"
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: fleetbase
      DB_USERNAME: root
      DB_PASSWORD: ""
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
      REDIS_HOST: cache
      SESSION_DOMAIN: localhost
      BROADCAST_DRIVER: socketcluster
      SOCKETCLUSTER_HOST: socket
      SOCKETCLUSTER_PORT: 8000
      MAIL_FROM_NAME: Fleetbase
      APP_NAME: Fleetbase
      APP_URL: http://localhost:8090
      LOG_CHANNEL: daily
      REGISTRY_HOST: https://registry.fleetbase.io
      REGISTRY_PREINSTALLED_EXTENSIONS: 'true'
      OSRM_HOST: https://router.project-osrm.org
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 360s
      retries: 5

  # Queue worker - Depends on application being healthy (ensures migrations ran)
  queue:
    image: fleetbase/fleetbase-api:latest
    command: ["php", "artisan", "queue:work"]
    restart: unless-stopped
    volumes:
      - ./api/.env:/fleetbase/api/.env
    environment:
      DATABASE_URL: "mysql://root@database/fleetbase"
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: fleetbase
      DB_USERNAME: root
      DB_PASSWORD: ""
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
      REDIS_HOST: cache
    depends_on:
      application:
        condition: service_healthy

  # Scheduler - Depends on application being healthy (ensures migrations ran)
  scheduler:
    image: fleetbase/fleetbase-api:latest
    command: ["go-crond", "--verbose", "root:./crontab"]
    restart: unless-stopped
    volumes:
      - ./api/.env:/fleetbase/api/.env
    environment:
      DATABASE_URL: "mysql://root@database/fleetbase"
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: fleetbase
      DB_USERNAME: root
      DB_PASSWORD: ""
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: tcp://cache
      REDIS_URL: tcp://cache
      REDIS_HOST: cache
    depends_on:
      application:
        condition: service_healthy

  # Fleetbase Console - Built from local source for REEUP BFF session code
  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./console/fleetbase.config.json:/usr/share/nginx/html/fleetbase.config.json
    depends_on:
      application:
        condition: service_healthy
